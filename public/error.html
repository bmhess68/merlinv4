<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unauthorized Access - Westchester / Putnam MERLIN</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-image: url('/images/background.jpg');
            background-size: cover;
            background-position: center;
        }

        .error-container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: #fff;
        }

        .error-container img {
            width: 200px;
            margin-bottom: 20px;
        }

        .error-container h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .error-container p {
            margin: 20px 0;
            font-size: 16px;
            color: #ddd;
        }

        .error-container a {
            color: #000;
            background-color: #fff;
            border: none;
            border-radius: 56px;
            display: inline-flex;
            align-items: center;
            font-family: 'Lato', sans-serif;
            font-size: 18px;
            font-weight: 600;
            height: 56px;
            justify-content: center;
            text-decoration: none;
            width: 296px;
            padding: 0 15px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .error-container a svg {
            height: 24px;
            width: 24px;
            margin-right: 12px;
        }

        .error-container .warning {
            font-size: 12px;
            color: #ddd;
            max-width: 300px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <img src="/images/logo.png" alt="Logo">
        <h1>Unauthorized Access</h1>
        <p>It appears that your email is not authorized to access this system.</p>
        <p>Please contact your system administrator if you believe this is a mistake.</p>
        <p class="warning">
            Unauthorized use of this system is prohibited and may result in disciplinary action and criminal prosecution.
        </p>
    </div>
</body>
</html>
